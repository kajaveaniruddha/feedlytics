services:
  redis:
    image: redis:7-alpine
    container_name: feedlytics-redis-dev
    command: ["redis-server", "--requirepass", "redispass"]
    environment:
      - REDIS_PASSWORD=redispass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  services:
    build:
      context: ./Services
      dockerfile: Dockerfile.dev
    container_name: feedlytics-services-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    develop:
      watch:
        - action: sync
          path: ./Services/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./Services/package.json
        - action: rebuild
          path: ./Services/pnpm-lock.yaml
    ports:
      - "3001:3001"
    volumes:
      - ./Services:/app
      - services_node_modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "sh ./scripts/wait-for-deps.sh pnpm run db:push && pnpm run dev",
      ]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  nextjs:
    build:
      context: ./Next
      dockerfile: Dockerfile.dev
    container_name: feedlytics-next-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    develop:
      watch:
        - action: sync
          path: ./Next/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./Next/package.json
        - action: rebuild
          path: ./Next/pnpm-lock.yaml
    ports:
      - "3000:3000"
    volumes:
      - ./Next:/app
      - next_node_modules:/app/node_modules
    command: ["pnpm", "dev"]
    depends_on:
      - services
    networks:
      - app-network

  widget:
    build:
      context: ./Widget
      dockerfile: Dockerfile.dev
    container_name: feedlytics-widget-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    develop:
      watch:
        - action: sync
          path: ./Widget/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./Widget/package.json
        - action: rebuild
          path: ./Widget/pnpm-lock.yaml
    ports:
      - "4173:4173"
    volumes:
      - ./Widget:/app
      - widget_node_modules:/app/node_modules
    command: ["pnpm", "run", "dev"]
    networks:
      - app-network

  prometheus:
    image: prom/prometheus
    container_name: feedlytics-prometheus-dev
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.dev.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    container_name: feedlytics-grafana-dev
    ports:
      - "3002:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: feedlytics-node-exporter-dev
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redisdata:
  prometheusdata:
  grafanadata:
  next_node_modules:
  services_node_modules:
  widget_node_modules:
