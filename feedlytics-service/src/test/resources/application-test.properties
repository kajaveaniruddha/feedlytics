# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests (use JPA auto-ddl instead)
spring.flyway.enabled=false

# Disable OAuth2 resource server for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000

grpc.server.port=-1
grpc.client.feedlyticsQueue.address=static://127.0.0.1:65534
grpc.client.feedlyticsQueue.negotiation-type=plaintext
feedlytics.internal.auth-token=test-internal-token
feedlytics.queue.callback-base-url=http://localhost:8081
