spring.application.name=feedlytics-service
server.port=${SERVER_PORT:8081}

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/feedlytics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Swagger UI custom path
springdoc.swagger-ui.path=/api-docs

# JWT Configuration
jwt.secret=${JWT_SECRET:local-dev-jwt-secret-change-me-min-32-chars}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:900}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:2592000}

# Refresh token cookie (Plan B: refresh in HttpOnly cookie, access in memory)
app.cookie.refresh-name=${APP_COOKIE_REFRESH_NAME:refreshToken}
app.cookie.path=${APP_COOKIE_PATH:/api/v1/auth}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.http-only=${APP_COOKIE_HTTP_ONLY:true}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}
app.cookie.domain=${APP_COOKIE_DOMAIN:}

# CORS (must list exact origins because credentials are enabled)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Google OAuth (ID token verification)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# gRPC client to feedlytics-queue-service (disable embedded gRPC server in this app)
grpc.server.port=-1
grpc.client.feedlyticsQueue.address=${GRPC_CLIENT_FEEDLYTICSQUEUE_ADDRESS:static://127.0.0.1:9090}
grpc.client.feedlyticsQueue.negotiation-type=plaintext

# Shared secret for queue service -> batch AI callback; must match queue worker payload
feedlytics.internal.auth-token=${FEEDLYTICS_INTERNAL_AUTH_TOKEN:dev-internal-auth-change-me}
# Base URL queue worker uses to POST /api/v1/internal/feedback/batch-ai-analysis
feedlytics.queue.callback-base-url=${FEEDLYTICS_QUEUE_CALLBACK_BASE_URL:http://localhost:8081}

# Stripe billing
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_replace_me}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_replace_me}
stripe.price.pro.monthly=${STRIPE_PRICE_PRO_MONTHLY:price_pro_monthly_replace_me}
stripe.price.pro.yearly=${STRIPE_PRICE_PRO_YEARLY:price_pro_yearly_replace_me}
stripe.price.business.monthly=${STRIPE_PRICE_BUSINESS_MONTHLY:price_business_monthly_replace_me}
stripe.price.business.yearly=${STRIPE_PRICE_BUSINESS_YEARLY:price_business_yearly_replace_me}
