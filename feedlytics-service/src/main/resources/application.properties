spring.application.name=feedlytics-service
server.port=8081

# PostgreSQL Database (Neon)
spring.datasource.url=jdbc:postgresql://ep-lingering-haze-ao0qc92t-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_Qo5JFsrv9hmS
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Swagger UI custom path
springdoc.swagger-ui.path=/api-docs

# JWT Configuration
jwt.secret=my-256-bit-secret-key-and-keeping-it-long-and-random-at-least-32-chars
jwt.access-token-expiry=900
jwt.refresh-token-expiry=2592000

# Refresh token cookie (Plan B: refresh in HttpOnly cookie, access in memory)
app.cookie.refresh-name=refreshToken
app.cookie.path=/api/v1/auth
app.cookie.secure=false
app.cookie.http-only=true
app.cookie.same-site=Lax
app.cookie.domain=

# CORS (must list exact origins because credentials are enabled)
app.cors.allowed-origins=http://localhost:3000

# Google OAuth (ID token verification)
google.oauth.client-id=567039124784-rjl83konqkimnq0hli8nhn8q8occaqqk.apps.googleusercontent.com

# gRPC client to feedlytics-queue-service (disable embedded gRPC server in this app)
grpc.server.port=-1
grpc.client.feedlyticsQueue.address=static://127.0.0.1:9090
grpc.client.feedlyticsQueue.negotiation-type=plaintext

# Shared secret for queue service -> batch AI callback; must match queue service env
feedlytics.internal.auth-token=dev-internal-auth-change-me
# Public base URL of this API (used by queue worker to POST /api/v1/internal/feedback/batch-ai-analysis)
feedlytics.queue.callback-base-url=http://localhost:8081
