services:
  redis:
    image: redis:7-alpine
    container_name: feedlytics-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  feedlytics-queue-service:
    image: ${DOCKER_USERNAME:-aniii1802}/feedlytics-queue-service:latest
    build:
      context: ./feedlytics-queue-service
      dockerfile: Dockerfile
    container_name: feedlytics-queue-service
    restart: always
    env_file:
      - prod/.env
    depends_on:
      - redis
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  feedlytics-service:
    image: ${DOCKER_USERNAME:-aniii1802}/feedlytics-service:latest
    build:
      context: ./feedlytics-service
      dockerfile: Dockerfile
    container_name: feedlytics-service
    restart: always
    env_file:
      - prod/.env
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
      - feedlytics-queue-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M

  feedlytics-dashboard:
    image: ${DOCKER_USERNAME:-aniii1802}/feedlytics-dashboard:latest
    build:
      context: ./feedlytics-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_ENABLE_MSW: ${NEXT_PUBLIC_ENABLE_MSW:-false}
    container_name: feedlytics-dashboard
    restart: always
    env_file:
      - prod/.env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      feedlytics-service:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  feedlytics-widget:
    image: ${DOCKER_USERNAME:-aniii1802}/feedlytics-widget:latest
    build:
      context: ./feedlytics-widget
      dockerfile: Dockerfile
      args:
        VITE_FEEDLYTICS_API_BASE_URL: ${VITE_FEEDLYTICS_API_BASE_URL}
    container_name: feedlytics-widget
    restart: always
    ports:
      - "127.0.0.1:4173:4173"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  prometheus:
    image: prom/prometheus
    container_name: feedlytics-prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  grafana:
    image: grafana/grafana
    container_name: feedlytics-grafana
    restart: always
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: feedlytics-node-exporter
    restart: always
    networks:
      - app-network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 64M

networks:
  app-network:
    driver: bridge

volumes:
  prometheusdata:
  grafanadata:
