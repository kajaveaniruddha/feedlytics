services:
  nextjs:
    image: aniii1802/feedlytics-nextjs:latest
    restart: always
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - services
      - redis
    env_file:
      - .env
    environment:
      - NODE_OPTIONS=--max-old-space-size=512
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  services:
    image: aniii1802/feedlytics-services:latest
    restart: always
    ports:
      - "3001:3001"
    networks:
      - app-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  widget:
    image: aniii1802/feedlytics-widget:latest
    restart: always
    ports:
      - "4173:4173"
    networks:
      - app-network
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: feedlytics-redis
    restart: always
    command: redis-server --requirepass redispass
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  prometheus:
    image: prom/prometheus
    container_name: feedlytics-prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  grafana:
    image: grafana/grafana
    container_name: feedlytics-grafana
    restart: always
    ports:
      - "3002:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: feedlytics-node-exporter
    restart: always
    networks:
      - app-network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 64M

networks:
  app-network:
    driver: bridge

volumes:
  prometheusdata:
  grafanadata:
