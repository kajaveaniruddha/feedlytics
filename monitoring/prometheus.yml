global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "services"
    metrics_path: /metrics
    static_configs:
      - targets: ["services:3001"]

  - job_name: "nextjs"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["nextjs:3000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
