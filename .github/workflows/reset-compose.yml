name: Reset Docker Compose

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to sync from"
        required: true
        default: "master"
      confirm:
        description: "Type YES to confirm (this will cause downtime)"
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    if: inputs.confirm == 'YES'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Tear down all containers and images
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            cd feedlytics/
            echo ">>> Current compose file:"
            head -5 docker-compose.yml
            echo ">>> Stopping containers and removing images..."
            docker compose down --rmi all
            echo ">>> Tear down complete."

      - name: Upload new compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          source: "Prod/docker-compose.yml"
          target: "feedlytics"
          strip_components: 1

      - name: Pull fresh images and start
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            cd feedlytics/
            echo ">>> Verifying files..."
            ls -la docker-compose.yml .env
            echo ">>> Pulling fresh images and starting..."
            docker compose up -d
            echo ">>> Cleaning up dangling images..."
            docker image prune -f
            echo ">>> Done. Current status:"
            docker compose ps
