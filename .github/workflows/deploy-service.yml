name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      dashboard:
        description: "Build & deploy feedlytics-dashboard"
        type: boolean
        default: false
      service:
        description: "Build & deploy feedlytics-service"
        type: boolean
        default: false
      queue:
        description: "Build & deploy feedlytics-queue-service"
        type: boolean
        default: false
      widget:
        description: "Build & deploy feedlytics-widget"
        type: boolean
        default: false
      sync_compose:
        description: "Sync docker-compose.yml to VPS"
        type: boolean
        default: false
      branch:
        description: "Branch to build from"
        required: true
        default: "master"
      deploy:
        description: "Deploy to VPS after build?"
        type: boolean
        default: true

env:
  DOCKER_USERNAME: aniii1802

jobs:
  sync-compose:
    if: inputs.sync_compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Sync docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          source: "docker-compose.yml"
          target: "feedlytics"
          overwrite: true

      - name: Apply compose on VPS
        if: inputs.deploy && !inputs.dashboard && !inputs.service && !inputs.queue && !inputs.widget
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/
            test -f prod/.env
            docker compose --env-file prod/.env up -d --force-recreate

  build-and-push:
    needs: sync-compose
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.sync-compose.result == 'success' || needs.sync-compose.result == 'skipped') &&
      (inputs.dashboard || inputs.service || inputs.queue || inputs.widget)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push feedlytics-queue-service
        if: inputs.queue
        run: |
          docker build \
            -t $DOCKER_USERNAME/feedlytics-queue-service:latest \
            ./feedlytics-queue-service
          docker push $DOCKER_USERNAME/feedlytics-queue-service:latest

      - name: Build and push feedlytics-service
        if: inputs.service
        run: |
          docker build \
            -t $DOCKER_USERNAME/feedlytics-service:latest \
            ./feedlytics-service
          docker push $DOCKER_USERNAME/feedlytics-service:latest

      - name: Build and push feedlytics-dashboard
        if: inputs.dashboard
        run: |
          API_BASE="${{ secrets.NEXT_PUBLIC_API_BASE_URL }}"
          API_BASE="${API_BASE:-https://api.feedlytics.in}"
          GOOGLE_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${API_BASE}" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${GOOGLE_ID}" \
            --build-arg NEXT_PUBLIC_ENABLE_MSW=false \
            -t $DOCKER_USERNAME/feedlytics-dashboard:latest \
            ./feedlytics-dashboard
          docker push $DOCKER_USERNAME/feedlytics-dashboard:latest

      - name: Build and push feedlytics-widget
        if: inputs.widget
        run: |
          WIDGET_API_BASE="${{ secrets.VITE_FEEDLYTICS_API_BASE_URL }}"
          WIDGET_API_BASE="${WIDGET_API_BASE:-https://api.feedlytics.in}"
          docker build \
            --build-arg VITE_FEEDLYTICS_API_BASE_URL="${WIDGET_API_BASE}" \
            -t $DOCKER_USERNAME/feedlytics-widget:latest \
            ./feedlytics-widget
          docker push $DOCKER_USERNAME/feedlytics-widget:latest

  deploy-queue:
    if: inputs.deploy && inputs.queue
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy feedlytics-queue-service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/
            test -f prod/.env
            docker compose --env-file prod/.env pull feedlytics-queue-service
            docker compose --env-file prod/.env up -d --force-recreate feedlytics-queue-service
            docker compose --env-file prod/.env ps feedlytics-queue-service
            echo "Waiting for feedlytics-queue-service health (up to 2 minutes)..."
            for i in $(seq 1 24); do
              if docker compose --env-file prod/.env exec -T feedlytics-queue-service node -e "
                require('http').get('http://127.0.0.1:3001/health', (res) => {
                  process.exit(res.statusCode === 200 ? 0 : 1);
                }).on('error', () => process.exit(1));
              "; then
                echo "feedlytics-queue-service is healthy"
                exit 0
              fi
              echo "Attempt $i/24 — not ready yet, retrying in 5s..."
              sleep 5
            done
            docker compose --env-file prod/.env logs --tail=100 feedlytics-queue-service || true
            echo "feedlytics-queue-service health check failed after 2 minutes" >&2
            exit 1

  deploy-service:
    if: inputs.deploy && inputs.service
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy feedlytics-service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/
            test -f prod/.env
            docker compose --env-file prod/.env pull feedlytics-service
            docker compose --env-file prod/.env up -d --force-recreate feedlytics-service
            docker compose --env-file prod/.env ps feedlytics-service
            echo "Waiting for feedlytics-service health (up to 6 minutes)..."
            for i in $(seq 1 36); do
              if curl -sf http://127.0.0.1:8081/actuator/health >/dev/null 2>&1; then
                echo "feedlytics-service is healthy"
                curl -s http://127.0.0.1:8081/actuator/health
                exit 0
              fi
              echo "Attempt $i/36 — not ready yet, retrying in 10s..."
              sleep 10
            done
            docker compose --env-file prod/.env logs --tail=100 feedlytics-service || true
            echo "feedlytics-service health check failed after 6 minutes" >&2
            exit 1

  deploy-dashboard:
    if: inputs.deploy && inputs.dashboard
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy feedlytics-dashboard
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/
            test -f prod/.env
            docker compose --env-file prod/.env pull feedlytics-dashboard
            docker compose --env-file prod/.env up -d --force-recreate feedlytics-dashboard
            docker compose --env-file prod/.env ps feedlytics-dashboard

  deploy-widget:
    if: inputs.deploy && inputs.widget
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy feedlytics-widget
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/
            test -f prod/.env
            docker compose --env-file prod/.env pull feedlytics-widget
            docker compose --env-file prod/.env up -d --force-recreate feedlytics-widget
            docker compose --env-file prod/.env ps feedlytics-widget

  cleanup:
    needs:
      - sync-compose
      - deploy-queue
      - deploy-service
      - deploy-dashboard
      - deploy-widget
    if: always() && inputs.deploy
    runs-on: ubuntu-latest

    steps:
      - name: Prune unused Docker images on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            docker image prune -f || true
