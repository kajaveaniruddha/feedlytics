name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      nextjs:
        description: "Deploy Next.js"
        type: boolean
        default: false
      services:
        description: "Deploy Services"
        type: boolean
        default: false
      widget:
        description: "Deploy Widget"
        type: boolean
        default: false
      branch:
        description: "Branch to build from"
        required: true
        default: "master"
      deploy:
        description: "Deploy to VPS after build?"
        type: boolean
        default: true

env:
  DOCKER_USERNAME: aniii1802

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: inputs.nextjs || inputs.services || inputs.widget

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Next.js
        if: inputs.nextjs
        run: |
          docker build \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} \
            --build-arg STRIPE_PRICE_ID=${{ secrets.STRIPE_PRICE_ID }} \
            --build-arg STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
            --build-arg STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
            -t $DOCKER_USERNAME/feedlytics-nextjs:latest ./Next
          docker push $DOCKER_USERNAME/feedlytics-nextjs:latest

      - name: Build and push Services
        if: inputs.services
        run: |
          docker build -t $DOCKER_USERNAME/feedlytics-services:latest ./Services
          docker push $DOCKER_USERNAME/feedlytics-services:latest

      - name: Build and push Widget
        if: inputs.widget
        run: |
          docker build -t $DOCKER_USERNAME/feedlytics-widget:latest ./Widget
          docker push $DOCKER_USERNAME/feedlytics-widget:latest

  deploy:
    if: inputs.deploy && (inputs.nextjs || inputs.services || inputs.widget)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Resolve deploy targets
        id: targets
        run: |
          SERVICES=""
          if [ "${{ inputs.nextjs }}" = "true" ]; then SERVICES="$SERVICES nextjs"; fi
          if [ "${{ inputs.services }}" = "true" ]; then SERVICES="$SERVICES services"; fi
          if [ "${{ inputs.widget }}" = "true" ]; then SERVICES="$SERVICES widget"; fi
          echo "compose_services=$SERVICES" >> $GITHUB_OUTPUT

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            cd feedlytics/
            docker compose pull ${{ steps.targets.outputs.compose_services }}
            docker compose up -d --force-recreate ${{ steps.targets.outputs.compose_services }}
            docker image prune -f
