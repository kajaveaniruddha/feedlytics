name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      dashboard:
        description: "Build & deploy feedlytics-dashboard"
        type: boolean
        default: false
      service:
        description: "Build & deploy feedlytics-service"
        type: boolean
        default: false
      queue:
        description: "Build & deploy feedlytics-queue-service"
        type: boolean
        default: false
      widget:
        description: "Build & deploy feedlytics-widget"
        type: boolean
        default: false
      branch:
        description: "Branch to build from"
        required: true
        default: "master"
      deploy:
        description: "Deploy to VPS after build?"
        type: boolean
        default: true

env:
  DOCKER_USERNAME: aniii1802

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: inputs.dashboard || inputs.service || inputs.queue || inputs.widget

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push feedlytics-queue-service
        if: inputs.queue
        run: |
          docker build \
            -t $DOCKER_USERNAME/feedlytics-queue-service:latest \
            ./feedlytics-queue-service
          docker push $DOCKER_USERNAME/feedlytics-queue-service:latest

      - name: Build and push feedlytics-service
        if: inputs.service
        run: |
          docker build \
            -t $DOCKER_USERNAME/feedlytics-service:latest \
            ./feedlytics-service
          docker push $DOCKER_USERNAME/feedlytics-service:latest

      - name: Build and push feedlytics-dashboard
        if: inputs.dashboard
        run: |
          API_BASE="${{ secrets.NEXT_PUBLIC_API_BASE_URL }}"
          API_BASE="${API_BASE:-https://api.feedlytics.in}"
          GOOGLE_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${API_BASE}" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${GOOGLE_ID}" \
            --build-arg NEXT_PUBLIC_ENABLE_MSW=false \
            -t $DOCKER_USERNAME/feedlytics-dashboard:latest \
            ./feedlytics-dashboard
          docker push $DOCKER_USERNAME/feedlytics-dashboard:latest

      - name: Build and push feedlytics-widget
        if: inputs.widget
        run: |
          WIDGET_API_BASE="${{ secrets.VITE_FEEDLYTICS_API_BASE_URL }}"
          WIDGET_API_BASE="${WIDGET_API_BASE:-https://api.feedlytics.in}"
          docker build \
            --build-arg VITE_FEEDLYTICS_API_BASE_URL="${WIDGET_API_BASE}" \
            -t $DOCKER_USERNAME/feedlytics-widget:latest \
            ./feedlytics-widget
          docker push $DOCKER_USERNAME/feedlytics-widget:latest

  deploy:
    if: inputs.deploy && (inputs.dashboard || inputs.service || inputs.queue || inputs.widget)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/

            ENV_FILE="prod/.env"
            if [ ! -f "$ENV_FILE" ] && [ -f ".env" ]; then
              echo "prod/.env missing; falling back to .env"
              ENV_FILE=".env"
            fi
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: expected prod/.env or .env" >&2
              exit 1
            fi

            SERVICES=""
            if [ "${{ inputs.dashboard }}" = "true" ]; then SERVICES="$SERVICES feedlytics-dashboard"; fi
            if [ "${{ inputs.service }}" = "true" ]; then SERVICES="$SERVICES feedlytics-service"; fi
            if [ "${{ inputs.queue }}" = "true" ]; then SERVICES="$SERVICES feedlytics-queue-service"; fi
            if [ "${{ inputs.widget }}" = "true" ]; then SERVICES="$SERVICES feedlytics-widget"; fi

            docker compose --env-file "$ENV_FILE" pull $SERVICES
            docker compose --env-file "$ENV_FILE" up -d --force-recreate $SERVICES
            docker compose --env-file "$ENV_FILE" ps $SERVICES
            docker image prune -f
