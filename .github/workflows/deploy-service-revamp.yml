name: Deploy feedlytics-service (revamp)

on:
  push:
    branches: [revamp]
    paths:
      - "feedlytics-service/**"
      - ".github/workflows/deploy-service-revamp.yml"

env:
  DOCKER_USERNAME: aniii1802

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push feedlytics-service
        run: |
          docker build \
            -t $DOCKER_USERNAME/feedlytics-service:latest \
            ./feedlytics-service
          docker push $DOCKER_USERNAME/feedlytics-service:latest

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            cd feedlytics/
            docker compose --env-file prod/.env pull feedlytics-service
            docker compose --env-file prod/.env up -d --force-recreate feedlytics-service
            docker image prune -f
