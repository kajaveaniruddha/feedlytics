name: Deploy feedlytics-service (revamp)

on:
  push:
    branches: [revamp]
    paths:
      - "feedlytics-service/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-service-revamp.yml"

env:
  DOCKER_USERNAME: aniii1802

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push feedlytics-service
        run: |
          docker build \
            -t $DOCKER_USERNAME/feedlytics-service:latest \
            ./feedlytics-service
          docker push $DOCKER_USERNAME/feedlytics-service:latest

      - name: Sync docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          source: "docker-compose.yml"
          target: "feedlytics"
          overwrite: true

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/

            ENV_FILE="prod/.env"
            if [ ! -f "$ENV_FILE" ] && [ -f ".env" ]; then
              echo "prod/.env missing; falling back to .env"
              ENV_FILE=".env"
            fi
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: expected prod/.env or .env" >&2
              exit 1
            fi

            docker compose --env-file "$ENV_FILE" config --services | grep -qx feedlytics-service

            docker compose --env-file "$ENV_FILE" pull feedlytics-service
            docker compose --env-file "$ENV_FILE" up -d --force-recreate feedlytics-service
            docker compose --env-file "$ENV_FILE" ps feedlytics-service
            docker image prune -f
