name: Test Service Docker Build

on:
  push:
    branches: [revamp]
    paths:
      - "feedlytics-service/**"
      - ".github/workflows/test-service-docker-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build feedlytics-service image
        run: docker build -t feedlytics-service:ci-test ./feedlytics-service
