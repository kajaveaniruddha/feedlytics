name: Sync Config to VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to sync from"
        required: true
        default: "revamp"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Sync docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          source: "docker-compose.yml"
          target: "feedlytics"
          overwrite: true

      - name: Restart containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_VPS_HOST }}
          username: ${{ secrets.HOSTINGER_VPS_USER }}
          key: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}
          script: |
            set -euo pipefail
            cd feedlytics/

            if [ ! -f prod/.env ]; then
              echo "Missing prod/.env on VPS" >&2
              exit 1
            fi

            docker compose --env-file prod/.env up -d --force-recreate
            docker image prune -f
