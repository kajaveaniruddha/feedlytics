name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

env:
  DOCKER_USERNAME: aniii1802
  HOSTINGER_VPS_HOST: ${{ secrets.HOSTINGER_VPS_HOST }}
  HOSTINGER_VPS_USER: ${{ secrets.HOSTINGER_VPS_USER }}
  HOSTINGER_VPS_PVT_KEY: ${{ secrets.HOSTINGER_VPS_PVT_KEY }}

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Next.js
        run: |
          docker build \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} \
            --build-arg STRIPE_PRICE_ID=${{ secrets.STRIPE_PRICE_ID }} \
            --build-arg STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
            --build-arg STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
            -t $DOCKER_USERNAME/feedlytics-nextjs:latest ./Next
          docker push $DOCKER_USERNAME/feedlytics-nextjs:latest

      - name: Deploy Next.js on Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.HOSTINGER_VPS_HOST }}
          username: ${{ env.HOSTINGER_VPS_USER }}
          key: ${{ env.HOSTINGER_VPS_PVT_KEY }}
          script: |
            cd feedlytics/
            docker-compose stop nextjs
            docker-compose rm -f nextjs
            docker rmi ${{ env.DOCKER_USERNAME }}/feedlytics-nextjs:latest || true
            docker-compose up -d nextjs
